name: Auto-merge trusted contributors

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if contributor is trusted
        id: check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          TRUSTED=$(cat .github/trusted-contributors.json | jq -r '.[]')
          for user in $TRUSTED; do
            if [ "$user" = "$AUTHOR" ]; then
              echo "trusted=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "trusted=false" >> $GITHUB_OUTPUT

      - name: Check files changed
        if: steps.check.outputs.trusted == 'true'
        id: files
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
          CONTENT_ONLY=true
          for file in $FILES; do
            if [[ ! "$file" =~ ^content/ ]]; then
              CONTENT_ONLY=false
              break
            fi
          done
          echo "content_only=$CONTENT_ONLY" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge
        if: steps.check.outputs.trusted == 'true' && steps.files.outputs.content_only == 'true'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
